global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  # FastAPI API gateway: HTTP request metrics + custom qaas_* metrics recorded
  # in the API process (e.g. eager-mode executions).
  - job_name: "qaas-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["quantum-orchestrator:8000"]

  # Celery worker: custom qaas_* metrics recorded during async job execution.
  - job_name: "qaas-worker"
    static_configs:
      - targets: ["quantum-orchestrator-worker:9100"]

  # Prometheus self-monitoring.
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
